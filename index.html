<!DOCTYPE html>    
<html lang="en">    
<head>    
<meta charset="UTF-8">    
<meta name="viewport" content="width=device-width, initial-scale=1.0">    
<title></title>    

<style>    
body {    
    margin: 0;    
    font-family: Arial;    
    background: #000;    
    color: white;    
}    

.header {    
    display: flex;    
    align-items: center;    
    padding: 10px;    
    background: #111;    
    border-bottom: 1px solid #222;    
}    

.dp {    
    width: 35px;    
    height: 35px;    
    border-radius: 50%;    
    background: gray;    
    margin-right: 10px;    
}    

.name { font-weight: bold; }    

.chat {    
    padding: 10px;    
    height: 80vh;    
    overflow-y: auto;    
}    

.msg {    
    max-width: 70%;    
    padding: 10px;    
    margin: 8px 0;    
    border-radius: 15px;    
}    

.left { background: #262626; }    
.right { background: #0095f6; margin-left: auto; }    

.typing { font-size: 12px; opacity: 0.6; }    

.center {    
    display: flex;    
    justify-content: center;    
    align-items: center;    
    height: 100vh;    
}    

input {
     padding: 10px; 
     background-color: whitesmoke;
    border: none;
    border-radius: 10px;
    transition: 0.3s;
} 

input:hover{
    box-shadow: 0 5px 10px gold;
}
button { 
    padding: 10px 22px;
 border: none;
 border-radius: 20px;
 background: linear-gradient(45deg,pink,white);
 transition: 0.3s;
}   
button:hover{
    transform: translateY(0);
    box-shadow: 0 0 15px whitesmoke;
}



#error { color: red; margin-top: 10px; }  

/* FINAL POPUP */
#finalBox {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    font-size: 45px;
    text-align: center;
    color: white;
    z-index: 999;
    animation: zoom 0.8s forwards;
}

@keyframes zoom {
    to {
        transform: translate(-50%, -50%) scale(1);
    }
}

/* Glow effect */
.glow {
    text-shadow: 0 0 10px red, 0 0 20px red, 0 0 40px red;
}

/* Background dark */
.dim {
    filter: blur(5px);
    opacity: 0.3;
}


.credit {
    position: fixed;
    bottom: 10px;
    width: 100%;
    text-align: center;
    font-size: 14px;
    opacity: 0.6;
}


</style>    
</head>    

<body>    

<div id="start" class="center">    
    <div>    
        <h2>Open Chat 😏</h2>    
        <input id="name" placeholder="Enter name">    
        <br><br>    
        <button onclick="start()">Open</button>    
        <div id="error"></div>  
    </div>    
</div>    

<div id="chatUI" style="display:none;">    
    <div class="header">    
        <div class="dp"></div>    
        <div class="name" id="username"></div>    
    </div>    
    <div class="chat" id="chat"></div>    
</div>    

<!-- FINAL -->
<div id="finalBox" class="glow"></div>

<div class="credit">Made by Dnyaneshwar 😎</div>

<script>  

let allowed = ["pikachu","aryan","omkar","chinmay","vaishnav","vaishnavi","anjali","aniket","aakash","shivam","pranav","prathmesh","mauli","gitanjali","srushti","rutuja","mangesh","ganesh","atharv","aditya","suyog","dharmesh","soham","samarth","sarvesh","prasad","pruthviraj","viraj","janhavi","pranesh","atul",,"diksha","sadiya","shravani","jayesh","rupesh","shrikar","shrikant","kshitij"];  


function addMsg(text){    
    let div = document.createElement("div");    
    div.className = "msg left";    
    div.innerHTML = text;    
    document.getElementById("chat").appendChild(div);    
    document.getElementById("chat").scrollTop = 9999;    
}    

function typing(show=true){    
    let t = document.getElementById("typing");    
    if(show){    
        if(!t){    
            let div = document.createElement("div");    
            div.id = "typing";    
            div.className = "typing";    
            div.innerHTML = "typing...";    
            document.getElementById("chat").appendChild(div);    
        }    
    } else {    
        if(t) t.remove();    
    }    
}    

function start(){    
    let name = document.getElementById("name").value.toLowerCase();  

    if(!allowed.includes(name)){  
        document.getElementById("error").innerHTML = "❌ Access Denied!";  
        return;  
    }  

    document.getElementById("error").innerHTML = "";  

    document.getElementById("start").style.display="none";    
    document.getElementById("chatUI").style.display="block";    
    document.getElementById("username").innerHTML = name;    

    let steps = [    
        "Hey 👀",    
        "you are soo prettiest...",    
        "You seen interesting 😏",    
        "you look very beautiful...",    
        "congratulations🎉🤣..."    
    ];    

    let i=0;    


    function next(){    
        if(i < steps.length){    
            typing(true);    
            setTimeout(()=>{    
                typing(false);    
                addMsg(steps[i]);    
                i++;    
                setTimeout(next,1500);    
            },1000);    
        } else {    
            typing(true);    
            setTimeout(()=>{    
                typing(false);

                // DIM BACKGROUND
                document.getElementById("chatUI").classList.add("dim");

                let final = document.getElementById("finalBox");
                final.style.display = "block";
                final.innerHTML = "🤡 APRIL FOOL " + name.toUpperCase() + " 😂";
            },1500);    
        }    
    }    

    setTimeout(next,1000);    
}  

</script>    

</body>    
</html>
